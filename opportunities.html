<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opportunities - VIBE HAUS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/opportunities.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="THE VIBE HAUS LOGO.png" alt="VIBE HAUS">
            </a>
            <ul class="nav-menu">
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#events">Events</a></li>
                <li><a href="index.html#gallery">Gallery</a></li>
                <li><a href="index.html#advert">Advertise</a></li>
                <li><a href="opportunities.html" class="active">Opportunities</a></li>
                <li><a href="advertiser-portal.html" class="btn-join">Advertise</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="opportunities-hero">
        <div class="hero-content">
            <h1>OPPORTUNITIES & <span class="highlight">INTERNSHIPS</span></h1>
            <p>Connect with amazing brands and kickstart your creative journey</p>
        </div>
    </section>

    <!-- Filter Section -->
    <section class="filters">
        <div class="container">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="internship">Internships</button>
                <button class="filter-btn" data-filter="collaboration">Collaborations</button>
                <button class="filter-btn" data-filter="job">Jobs</button>
            </div>
        </div>
    </section>

    <!-- Opportunities Grid -->
    <section class="opportunities-grid">
        <div class="container">
            <div class="opportunities-list" id="opportunitiesList">
                <!-- Opportunities will be dynamically loaded here -->
            </div>
        </div>
    </section>

    <!-- Application Modal -->
    <div class="modal" id="applicationModal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Apply for Opportunity</h2>
            <form id="applicationForm">
                <input type="hidden" id="opportunityId">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="applicantName" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="applicantEmail" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="applicantPhone">
                </div>
                <div class="form-group">
                    <label>Cover Letter</label>
                    <textarea id="coverLetter" rows="5" required></textarea>
                </div>
                <div class="form-group">
                    <label>Resume/CV (PDF)</label>
                    <input type="file" id="resume" accept=".pdf" required>
                </div>
                <button type="submit" class="btn btn-primary">Submit Application</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <img src="THE VIBE HAUS LOGO.png" alt="VIBE HAUS">
                </div>
                <div class="social-links">
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-facebook"></i></a>
                    <a href="https://snapchat.com/scan"><i class="fab fa-snapchat"></i></a>
                </div>
                <p class="copyright">&copy; 2024 VIBE HAUS. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script src="js/opportunities.js"></script>
</body>
</html>
