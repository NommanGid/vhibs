<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>External Events - VIBE HAUS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/external-events.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="THE VIBE HAUS LOGO.png" alt="VIBE HAUS">
            </a>
            <ul class="nav-menu">
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#events">Internal Events</a></li>
                <li><a href="external-events.html" class="active">External Events</a></li>
                <li><a href="index.html#gallery">Gallery</a></li>
                <li><a href="index.html#advert">Advertise</a></li>
                <li><a href="opportunities.html">Opportunities</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="external-events-hero">
        <div class="hero-content">
            <h1>EXTERNAL <span class="highlight">EVENTS</span></h1>
            <p>Discover amazing events from our partner brands and get exclusive discounts</p>
        </div>
    </section>

    <!-- Filter Section -->
    <section class="filters">
        <div class="container">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All Events</button>
                <button class="filter-btn" data-filter="music">Music</button>
                <button class="filter-btn" data-filter="art">Art</button>
                <button class="filter-btn" data-filter="food">Food & Drink</button>
                <button class="filter-btn" data-filter="fashion">Fashion</button>
            </div>
        </div>
    </section>

    <!-- Events Grid -->
    <section class="external-events-grid">
        <div class="container">
            <div class="events-list" id="externalEventsList">
                <!-- Events will be dynamically loaded here -->
            </div>
        </div>
    </section>

    <!-- Ticket Purchase Modal -->
    <div class="modal" id="ticketModal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Purchase Tickets</h2>
            <div class="event-details" id="eventDetails">
                <!-- Event details will be populated here -->
            </div>
            <form id="ticketForm">
                <div class="form-group">
                    <label>Number of Tickets</label>
                    <input type="number" id="ticketQuantity" min="1" max="10" value="1" required>
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="buyerName" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="buyerEmail" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="buyerPhone" required>
                </div>
                <div class="discount-info">
                    <i class="fas fa-tag"></i>
                    <span>VIBE HAUS members get <strong>20% off</strong>!</span>
                </div>
                <div class="total-price">
                    <span>Total:</span>
                    <span id="totalPrice">$0.00</span>
                </div>
                <button type="submit" class="btn btn-primary">Purchase Tickets</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <img src="THE VIBE HAUS LOGO.png" alt="VIBE HAUS">
                </div>
                <div class="social-links">
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-facebook"></i></a>
                    <a href="https://snapchat.com/scan"><i class="fab fa-snapchat"></i></a>
                </div>
                <p class="copyright">&copy; 2024 VIBE HAUS. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script src="js/external-events.js"></script>
</body>
</html>
